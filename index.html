<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flonsy Mobile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { overflow: hidden; background: #000; width: 100%; height: 100%; touch-action: none; user-select: none; -webkit-user-select: none; position: fixed; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        .game-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 25, 0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; pointer-events: auto; backdrop-filter: blur(5px); }
        .game-menu h1 { color: #8ab4f8; font-size: 36px; margin-bottom: 50px; text-transform: uppercase; letter-spacing: 6px; text-shadow: 0 0 15px rgba(100, 150, 255, 0.5); border-bottom: 2px solid #4a6a9a; padding-bottom: 15px; font-family: monospace; }
        .menu-btn { width: 260px; padding: 15px; margin: 10px; font-size: 18px; background: linear-gradient(to bottom, #4a7bbb, #2a4a7b); color: white; border: 2px solid #8ab4f8; border-radius: 4px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); box-shadow: 0 0 15px rgba(100, 150, 255, 0.4), inset 0 1px 0 rgba(255,255,255,0.3); cursor: pointer; }
        .menu-btn:active { background: linear-gradient(to top, #4a7bbb, #2a4a7b); transform: scale(0.98); }
        #start-menu { display: flex; }
        #pause-menu { display: none; }
        #cheat-input { width: 260px; padding: 15px; margin: 15px 0; font-size: 18px; background: rgba(0,0,0,0.5); color: #ffaa00; border: 2px solid #ffaa00; border-radius: 4px; text-align: center; outline: none; font-family: monospace; }
        #cheat-msg { color: white; height: 20px; margin-bottom: 20px; font-size: 14px; letter-spacing: 1px; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #joy-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; transform: translate(-50%, -50%); }
        .btn { pointer-events: auto; position: absolute; color: white; border: none; font-weight: bold; text-align: center; z-index: 15; background: transparent; }
        #btn-fire { bottom: 40px; right: 30px; width: 90px; height: 90px; border: none; background: transparent; display: flex; justify-content: center; align-items: center; }
        #btn-fire svg { width: 80px; height: 80px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        #pause-btn { top: 20px; left: 20px; width: 50px; height: 50px; border: 3px solid rgba(255,255,255,0.8); border-radius: 50%; background: transparent; }
        #pause-btn::before, #pause-btn::after { content: ''; position: absolute; top: 50%; transform: translateY(-50%); width: 6px; height: 22px; background: white; border-radius: 2px; }
        #pause-btn::before { left: 30%; } #pause-btn::after { left: 55%; }
        #btn-gun { bottom: 150px; right: 30px; width: 100px; height: 40px; font-size: 12px; line-height: 40px; background: rgba(0,100,200,0.6); backdrop-filter: blur(2px); border-radius: 10px; }
        #btn-reload { bottom: 200px; right: 30px; width: 100px; height: 40px; font-size: 12px; line-height: 40px; display: none; background: rgba(255, 165, 0,0.7); border-radius: 10px; }
        #cross { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; transform: translate(-50%, -50%); pointer-events: none; }
        #cross::before, #cross::after { content: ''; position: absolute; background: rgba(255,255,255,0.9); }
        #cross::before { top: 0; left: 50%; width: 2px; height: 100%; transform: translateX(-50%); }
        #cross::after { top: 50%; left: 0; width: 100%; height: 2px; transform: translateY(-50%); }
        .ch-dot { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: white; border-radius: 50%; transform: translate(-50%, -50%); }
        #hitmark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 30px; color: red; font-weight: bold; opacity: 0; pointer-events: none; text-shadow: 0 0 5px black; }
        #hud-top { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); text-align: center; color: white; text-shadow: 2px 2px 4px black; }
        #level-display { font-size: 14px; color: #ffaa00; margin-bottom: 5px; }
        #w-name { font-size: 16px; letter-spacing: 2px; opacity: 0.8; }
        #w-ammo { font-size: 32px; font-weight: bold; } #w-ammo span { font-size: 16px; color: #aaa; }
        #hp-box { position: absolute; bottom: 40px; left: 20px; width: 40%; max-width: 150px; }
        #hp-txt { color: white; font-size: 14px; margin-bottom: 4px; text-shadow: 1px 1px 2px black; }
        #hp-bg-ui { width: 100%; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; border: 1px solid rgba(255,255,255,0.2); }
        #hp-fill-ui { width: 100%; height: 100%; background: #0f0; border-radius: 5px; transition: width 0.2s; }
        #cheat-indicator { position: absolute; top: 80px; left: 20px; color: #ffaa00; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px black; display: none; }
        #death { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.5); display: none; justify-content: center; align-items: center; flex-direction: column; pointer-events: auto; z-index: 40; }
        #death h1 { color: white; font-size: 40px; margin-bottom: 20px; text-shadow: 0 0 20px black; }
        #death button { padding: 15px 30px; font-size: 20px; background: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <canvas id="c"></canvas>

    <div id="start-menu" class="game-menu">
        <h1>Standoff 2 Mobile</h1>
        <button class="menu-btn" id="btn-level1">Уровень 1</button>
        <button class="menu-btn" id="btn-level2">Уровень 2</button>
        <button class="menu-btn" id="btn-level3">Уровень 3</button>
    </div>

    <div id="ui">
        <div id="cross"><div class="ch-dot"></div></div>
        <div id="hitmark">X</div>
        <div id="cheat-indicator"></div>
        <div id="hud-top">
            <div id="level-display">УРОВЕНЬ 1</div>
            <div id="w-name">НОЖ</div>
            <div id="w-ammo">∞</div>
        </div>
        <div id="hp-box">
            <div id="hp-txt">HP: 100</div>
            <div id="hp-bg-ui"><div id="hp-fill-ui"></div></div>
        </div>
        <div id="joy-base"><div id="joy-stick"></div></div>
        <button id="pause-btn" class="btn"></button>
        <button id="btn-fire" class="btn">
            <svg viewBox="0 0 100 100" fill="none" stroke="white" stroke-width="5">
                <circle cx="50" cy="50" r="35" /><circle cx="50" cy="50" r="15" stroke-width="3" />
                <circle cx="50" cy="50" r="3" fill="white" stroke="none" />
                <line x1="50" y1="0" x2="50" y2="100" /><line x1="0" y1="50" x2="100" y2="50" />
            </svg>
        </button>
        <button id="btn-gun" class="btn">НОЖ</button>
        <button id="btn-reload" class="btn">ПЕРЕЗАРЯДКА</button>

        <div id="pause-menu" class="game-menu">
            <h1>Пауза</h1>
            <button class="menu-btn" id="btn-resume">Продолжить</button>
            <button class="menu-btn" id="btn-restart">Начать заново</button>
            <input type="number" id="cheat-input" placeholder="ЧИТ-КОД" inputmode="numeric">
            <button class="menu-btn" id="btn-cheat" style="background: linear-gradient(to bottom, #8a6a00, #5a4000); border-color: #ffaa00;">Ввести чит</button>
            <div id="cheat-msg"></div>
        </div>
        <div id="death"><h1>УБИТ</h1><button onclick="location.reload()">ЗАНОВО</button></div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const canvas = document.getElementById('c');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0xC8E6FF, 15, 70);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 20);
        scene.add(camera);

        let isPaused = false, gameStarted = false, hp = 100, level = 1;
        let godMode = false, flyMode = false, highlightMode = false, aimbotMode = false;

        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 1.0);
        sun.position.set(-10, 20, 10);
        scene.add(sun);
        camera.add(new THREE.PointLight(0xffffff, 0.3, 15));

        const mFloor = new THREE.MeshPhongMaterial({ color: 0xA0A0A0 });
        const mWall = new THREE.MeshPhongMaterial({ color: 0x8A8A8A });
        const mBox = new THREE.MeshPhongMaterial({ color: 0x6B4226 });
        const mGun = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 });
        const mGun2 = new THREE.MeshPhongMaterial({ color: 0x555555, shininess: 150 });
        const mCamo = new THREE.MeshPhongMaterial({ color: 0x4B5320 });
        const mSkin = new THREE.MeshPhongMaterial({ color: 0xD2B48C });
        const mHelmet = new THREE.MeshPhongMaterial({ color: 0x3B3B3B });
        const mGlow = new THREE.MeshPhongMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.8 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), mFloor);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const wGeo = new THREE.BoxGeometry(80, 5, 0.5);
        [[0,2.5,-40,0], [0,2.5,40,0], [-40,2.5,0,Math.PI/2], [40,2.5,0,Math.PI/2]].forEach(w => {
            const mesh = new THREE.Mesh(wGeo, mWall);
            mesh.position.set(w[0], w[1], w[2]);
            mesh.rotation.y = w[3];
            scene.add(mesh);
        });

        const colliders = [];
        function createBox(x, y, z, w, h, d) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mBox);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            colliders.push({ x, z, w: w/2 + 0.4, d: d/2 + 0.4 });
        }
        createBox(-4, 1.5, 10, 6, 3, 1);
        createBox(4, 1.5, 10, 6, 3, 1);
        createBox(0, 1, 7, 1, 2, 6);
        createBox(-10, 0.75, 0, 4, 1.5, 4);
        createBox(10, 0.75, 0, 4, 1.5, 4);
        createBox(-15, 1, -15, 8, 2, 1);
        createBox(15, 1, -15, 8, 2, 1);

        const guns = [
            { name: 'НОЖ', type: 'melee', dmg: 50, rate: 10, mag: Infinity, res: Infinity, spread: 0, recoil: 0, auto: false, range: 3 },
            { name: 'GLOCK 17', type: 'gun', dmg: 25, rate: 10, mag: 20, res: 60, spread: 0.02, recoil: 0.01, auto: false },
            { name: 'AK-47', type: 'gun', dmg: 35, rate: 5, mag: 30, res: 90, spread: 0.06, recoil: 0.05, auto: true },
            { name: 'AWP', type: 'gun', dmg: 150, rate: 50, mag: 10, res: 30, spread: 0.005, recoil: 0.15, auto: false },
            { name: 'ОСКОЛОЧНАЯ', type: 'frag', dmg: 200, rate: 30, mag: 3, res: 0, spread: 0, recoil: 0, auto: false },
            { name: 'МОЛОТОВ', type: 'molotov', dmg: 10, rate: 30, mag: 2, res: 0, spread: 0, recoil: 0, auto: false }
        ];
        let gIdx = 0, gun = guns[0], ammo = gun.mag, reserve = gun.res, cooldown = 0, reloading = false;

        const gunHolder = new THREE.Group();
        camera.add(gunHolder);

        const models = [];
        const mk = new THREE.Group();
        mk.add(new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.3), new THREE.MeshPhongMaterial({ color: 0xcccccc })));
        mk.children[0].position.z = -0.15;
        mk.add(new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.05), mGun));
        mk.children[1].position.set(0, -0.05, 0.05);
        mk.position.set(0.3, -0.2, -0.4);
        mk.rotation.z = -0.3;
        gunHolder.add(mk);
        models.push(mk);

        const createGunModel = (bPos, bScale, gPos, gScale, sPos, sScale, pPos, pScale, pos, addStock) => {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(...bScale), mGun); body.position.set(...bPos); g.add(body);
            const grip = new THREE.Mesh(new THREE.BoxGeometry(...gScale), mGun); grip.position.set(...gPos); g.add(grip);
            if (sScale) { const sight = new THREE.Mesh(new THREE.BoxGeometry(...sScale), mGun2); sight.position.set(...sPos); g.add(sight); }
            if (pScale) { const pipe = new THREE.Mesh(new THREE.CylinderGeometry(...pScale), mGun2); pipe.position.set(...pPos); pipe.rotation.x = Math.PI/2; g.add(pipe); }
            if (addStock) { const stock = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, 0.15), mGun); stock.position.set(0, 0.02, 0.12); g.add(stock); }
            g.position.set(...pos); g.visible = false; gunHolder.add(g); return g;
        };
        models.push(createGunModel([0,-0.1,-0.1], [0.05,0.1,0.2], [0,-0.1,0.02], [0.04,0.12,0.06], null, null, null, null, [0.25,-0.2,-0.4], false));
        models.push(createGunModel([0,0,-0.25], [0.06,0.08,0.5], [0,-0.1,0.1], [0.04,0.12,0.06], null, null, [0,0,-0.55], [0.015,0.015,0.2], [0.3,-0.25,-0.5], true));
        models.push(createGunModel([0,0,-0.35], [0.06,0.1,0.7], [0,-0.1,0.15], [0.04,0.12,0.06], [0,0.08,-0.1], [0.05,0.05,0.2], [0,0,-0.75], [0.02,0.02,0.4], [0.3,-0.25,-0.6], false));

        const mFrag = new THREE.Group();
        mFrag.add(new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.12, 8), new THREE.MeshPhongMaterial({ color: 0x335533 })));
        mFrag.children[0].rotation.x = Math.PI/2;
        mFrag.position.set(0.3, -0.2, -0.4); mFrag.visible = false; gunHolder.add(mFrag); models.push(mFrag);

        const mMol = new THREE.Group();
        mMol.add(new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.03, 0.15, 8), new THREE.MeshPhongMaterial({ color: 0x88ccff, transparent: true, opacity: 0.5 })));
        mMol.children[0].rotation.x = Math.PI/2;
        mMol.add(new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.08, 0.02), mGun));
        mMol.children[1].position.set(0, 0.05, -0.08);
        mMol.position.set(0.3, -0.2, -0.4); mMol.visible = false; gunHolder.add(mMol); models.push(mMol);

        const enemies = [];

        function createEnemy(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.35, 1.2, 8), mCamo);
            body.position.y = 0.6; group.add(body);
            const vest = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.5, 0.3), new THREE.MeshPhongMaterial({ color: 0x556B2F }));
            vest.position.y = 0.9; group.add(vest);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), mSkin);
            head.position.y = 1.55; group.add(head);
            const helmet = new THREE.Mesh(new THREE.SphereGeometry(0.22, 8, 4, 0, Math.PI*2, 0, Math.PI/2), mHelmet);
            helmet.position.y = 1.6; group.add(helmet);
            group.position.set(x, 0, z);
            scene.add(group);
            enemies.push({ group, hp: 100, alive: true, x, z, materials: [body.material, vest.material, head.material, helmet.material] });
        }

        function spawnEnemies(count) {
            enemies.forEach(e => scene.remove(e.group));
            enemies.length = 0;
            for (let i = 0; i < count; i++) {
                const x = (Math.random() - 0.5) * 30;
                const z = (Math.random() - 0.5) * 30;
                createEnemy(x, z);
            }
        }

        function startGame(lvl) {
            level = lvl; hp = 100; gameStarted = true; isPaused = false;
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('pause-menu').style.display = 'none';
            document.getElementById('death').style.display = 'none';
            document.getElementById('level-display').innerText = 'УРОВЕНЬ ' + lvl;
            document.getElementById('hp-fill-ui').style.width = '100%';
            document.getElementById('hp-txt').innerText = 'HP: 100';
            spawnEnemies(5 + lvl * 3);
            updHUD();
            if (tg) tg.sendData(JSON.stringify({ event: 'start', level: lvl }));
        }

        window.startGame = startGame;

        document.getElementById('btn-level1').addEventListener('click', () => startGame(1));
        document.getElementById('btn-level2').addEventListener('click', () => startGame(2));
        document.getElementById('btn-level3').addEventListener('click', () => startGame(3));

        function updHUD() {
            document.getElementById('w-name').innerText = gun.name;
            document.getElementById('w-ammo').innerHTML = ammo === Infinity ? '∞' : `${ammo} <span>/ ${reserve}</span>`;
            document.getElementById('btn-gun').innerText = gun.name;
        }

        function switchGun() {
            if (reloading || isPaused) return;
            models[gIdx].visible = false;
            gIdx = (gIdx + 1) % guns.length;
            gun = guns[gIdx]; ammo = gun.mag; reserve = gun.res;
            models[gIdx].visible = true;
            camera.fov = gIdx === 3 ? 40 : 70;
            camera.updateProjectionMatrix();
            updHUD();
        }

        function reload() {
            if (reloading || ammo === gun.mag || gun.type !== 'gun' || reserve <= 0) return;
            reloading = true;
            document.getElementById('btn-reload').style.display = 'block';
            setTimeout(() => {
                const take = Math.min(gun.mag - ammo, reserve);
                ammo += take; reserve -= take;
                reloading = false;
                document.getElementById('btn-reload').style.display = 'none';
                updHUD();
            }, 2000);
        }

        function shoot() {
            if (!gameStarted || isPaused || reloading || cooldown > 0) return;
            if (gun.type === 'gun' && ammo <= 0) { reload(); return; }
            cooldown = gun.rate;
            if (gun.type === 'gun') ammo--;
            updHUD();

            // Raycast
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(camera.quaternion);
            const origin = camera.position.clone();

            for (let e of enemies) {
                if (!e.alive) continue;
                const dist = origin.distanceTo(e.group.position);
                if (dist < (gun.range || 50)) {
                    const toEnemy = e.group.position.clone().sub(origin).normalize();
                    const dot = dir.dot(toEnemy);
                    if (dot > 0.85) {
                        e.hp -= gun.dmg;
                        document.getElementById('hitmark').style.opacity = '1';
                        setTimeout(() => document.getElementById('hitmark').style.opacity = '0', 150);
                        if (e.hp <= 0) {
                            e.alive = false;
                            scene.remove(e.g
